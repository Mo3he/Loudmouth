name: Kenopsia
options:
  bundleIdPrefix: net.mohome
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: KTX2SJ3P98
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    STRING_CATALOG_GENERATE_SYMBOLS: "YES"

targets:
  Kenopsia:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Kenopsia/Sources
      - path: Kenopsia/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: Kenopsia/Resources/Assets.xcassets
      # Demo assets (audio + artwork) - only present after running scripts/setup_demo_assets.sh
      - path: Kenopsia/DemoAssets
        optional: true
        buildPhase: resources
      # GoogleCast static xcframework resource bundles — must be copied to the app
      # bundle explicitly (static frameworks don't embed resources automatically).
      - path: Frameworks/GoogleCast.xcframework/ios-arm64/GoogleCast.framework/GoogleCastCoreResources.bundle
        buildPhase: resources
      - path: Frameworks/GoogleCast.xcframework/ios-arm64/GoogleCast.framework/GoogleCastUIResources.bundle
        buildPhase: resources
      - path: Frameworks/GoogleCast.xcframework/ios-arm64/GoogleCast.framework/GoogleCastOptionalUIResources.bundle
        buildPhase: resources
      - path: Frameworks/GoogleCast.xcframework/ios-arm64/GoogleCast.framework/GoogleSansRegular.bundle
        buildPhase: resources
      - path: Frameworks/GoogleCast.xcframework/ios-arm64/GoogleCast.framework/GoogleSansMedium.bundle
        buildPhase: resources
      - path: Frameworks/GoogleCast.xcframework/ios-arm64/GoogleCast.framework/GoogleSansBold.bundle
        buildPhase: resources
      - path: Frameworks/GoogleCast.xcframework/ios-arm64/GoogleCast.framework/MaterialDialogs.bundle
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.kenopsia
        "PRODUCT_BUNDLE_IDENTIFIER[sdk=macosx*]": maccatalyst.net.mohome.kenopsia
        INFOPLIST_FILE: Kenopsia/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ENABLE_DEBUG_DYLIB: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "YES"
        INFOPLIST_KEY_UIBackgroundModes: audio
        # Required for the static GoogleCast.xcframework
        OTHER_LDFLAGS: "-ObjC -lc++"
    linkedFrameworks:
    entitlements:
      path: Kenopsia/Kenopsia.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)net.mohome.kenopsia
        com.apple.security.application-groups:
          - group.net.mohome.kenopsia
        com.apple.developer.icloud-container-identifiers:
          - iCloud.net.mohome.kenopsia
        com.apple.developer.icloud-services:
          - CloudDocuments
    dependencies:
      - target: KenopsiaWidget
        embed: true
      - target: KenopsiaWatch
        embed: true
      # Google Cast iOS SDK 4.8.4 (static build - no Protobuf dependency).
      # xcframework lives in Frameworks/ in this repo.
      - framework: Frameworks/GoogleCast.xcframework
        embed: false
      # Required by GoogleCast static xcframework
      - sdk: SystemConfiguration.framework

  KenopsiaWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KenopsiaWidget/Sources
    resources:
      - path: KenopsiaWidget/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.kenopsia.widget
        INFOPLIST_FILE: KenopsiaWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "YES"
        "PRODUCT_BUNDLE_IDENTIFIER[sdk=macosx*]": maccatalyst.net.mohome.kenopsia.widget
    entitlements:
      path: KenopsiaWidget/KenopsiaWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.mohome.kenopsia

  KenopsiaWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: KenopsiaWatch/Sources
      - path: KenopsiaWatch/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.kenopsia.watch
        INFOPLIST_FILE: KenopsiaWatch/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  KenopsiaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KenopsiaTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.kenopsia.tests
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Kenopsia

  KenopsiaScreenshots:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KenopsiaScreenshots
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.kenopsia.screenshots
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Kenopsia

  KenopsiaWatchScreenshots:
    type: bundle.ui-testing
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: KenopsiaWatchScreenshots
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.kenopsia.watchscreenshots
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: KenopsiaWatch

schemes:
  Kenopsia:
    build:
      targets:
        Kenopsia: all
        KenopsiaWatch: all
        KenopsiaTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - KenopsiaTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  KenopsiaWidget:
    build:
      targets:
        KenopsiaWidget: all
    run:
      config: Debug
      environmentVariables:
        - variable: _XCWidgetKind
          value: KenopsiaWidget
          isEnabled: true
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  KenopsiaScreenshots:
    build:
      targets:
        Kenopsia: all
        KenopsiaScreenshots: [test]
    test:
      config: Debug
      targets:
        - KenopsiaScreenshots

  KenopsiaWatchApp:
    build:
      targets:
        KenopsiaWatch: all
    run:
      config: Debug
    archive:
      config: Release

  KenopsiaWatchScreenshots:
    build:
      targets:
        KenopsiaWatch: all
        KenopsiaWatchScreenshots: [test]
    test:
      config: Debug
      targets:
        - KenopsiaWatchScreenshots
      disableMainThreadChecker: true
    analyze:
      config: Debug
