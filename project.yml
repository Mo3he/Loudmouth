name: Loudmouth
options:
  bundleIdPrefix: net.mohome
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: KTX2SJ3P98
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    STRING_CATALOG_GENERATE_SYMBOLS: "YES"

targets:
  Loudmouth:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Loudmouth/Sources
      - path: Loudmouth/PrivacyInfo.xcprivacy
        buildPhase: resources
    resources:
      - path: Loudmouth/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.loudmouth
        "PRODUCT_BUNDLE_IDENTIFIER[sdk=macosx*]": maccatalyst.net.mohome.loudmouth
        INFOPLIST_FILE: Loudmouth/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ENABLE_DEBUG_DYLIB: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "YES"
        # Background audio is required for music playback
        INFOPLIST_KEY_UIBackgroundModes: audio
    entitlements:
      path: Loudmouth/Loudmouth.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)net.mohome.loudmouth
        com.apple.security.application-groups:
          - group.net.mohome.loudmouth
    dependencies:
      - target: LoudmouthWidget
        embed: true

  LoudmouthWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LoudmouthWidget/Sources
    resources:
      - path: LoudmouthWidget/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.loudmouth.widget
        INFOPLIST_FILE: LoudmouthWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "YES"
        "PRODUCT_BUNDLE_IDENTIFIER[sdk=macosx*]": maccatalyst.net.mohome.loudmouth.widget
    entitlements:
      path: LoudmouthWidget/LoudmouthWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.mohome.loudmouth

schemes:
  Loudmouth:
    build:
      targets:
        Loudmouth: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  LoudmouthWidget:
    build:
      targets:
        LoudmouthWidget: all
    run:
      config: Debug
      environmentVariables:
        - variable: _XCWidgetKind
          value: LoudmouthNowPlayingWidget
          isEnabled: true
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
