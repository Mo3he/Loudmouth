name: Kenopsia
options:
  bundleIdPrefix: net.mohome
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: KTX2SJ3P98
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    STRING_CATALOG_GENERATE_SYMBOLS: "YES"

targets:
  Kenopsia:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Kenopsia/Sources
      - path: Kenopsia/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: Kenopsia/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.kenopsia
        "PRODUCT_BUNDLE_IDENTIFIER[sdk=macosx*]": maccatalyst.net.mohome.kenopsia
        INFOPLIST_FILE: Kenopsia/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ENABLE_DEBUG_DYLIB: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "YES"
        INFOPLIST_KEY_UIBackgroundModes: audio
    linkedFrameworks:
      - CarPlay
    entitlements:
      path: Kenopsia/Kenopsia.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)net.mohome.kenopsia
        com.apple.security.application-groups:
          - group.net.mohome.kenopsia
        com.apple.developer.music-kit: true
        com.apple.developer.carplay-audio: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.net.mohome.kenopsia
        com.apple.developer.icloud-services:
          - CloudDocuments
    dependencies:
      - target: KenopsiaWidget
        embed: true
      - target: KenopsiaWatch
        embed: true

  KenopsiaWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KenopsiaWidget/Sources
    resources:
      - path: KenopsiaWidget/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.kenopsia.widget
        INFOPLIST_FILE: KenopsiaWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "YES"
        "PRODUCT_BUNDLE_IDENTIFIER[sdk=macosx*]": maccatalyst.net.mohome.kenopsia.widget
    entitlements:
      path: KenopsiaWidget/KenopsiaWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.mohome.kenopsia

  KenopsiaWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: KenopsiaWatch/Sources
      - path: KenopsiaWatch/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.kenopsia.watch
        INFOPLIST_FILE: KenopsiaWatch/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  Kenopsia:
    build:
      targets:
        Kenopsia: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  KenopsiaWidget:
    build:
      targets:
        KenopsiaWidget: all
    run:
      config: Debug
      environmentVariables:
        - variable: _XCWidgetKind
          value: KenopsiaWidget
          isEnabled: true
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
